<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>cycle.glb preview</title>
  <style>
    html, body { margin: 0; height: 100%; background: #87ceeb; color: #222; font-family: system-ui, sans-serif; overflow: hidden; }
    #info {
      position: absolute; top: 10px; left: 10px; padding: 8px 12px;
      background: rgba(255,255,255,0.75); border-radius: 6px; font-size: 13px; z-index: 10;
    }
    #info b { color: #0a5a9c; }
    #fps {
      position: absolute; top: 10px; right: 10px; padding: 6px 10px;
      background: rgba(0,0,0,0.55); color: #9fe39f; border-radius: 6px; font: 12px/1 monospace; z-index: 10;
    }
    #loader {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 18px; pointer-events: none; color: #222;
    }
    #controls { position: absolute; bottom: 10px; left: 10px; background: rgba(255,255,255,0.8); padding: 8px 12px; border-radius: 6px; font-size: 12px; color: #222; line-height: 1.5; }
    #controls label { display: block; }
    #controls select, #controls input[type=range] { margin-left: 4px; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="info">Model: <b>cycle.glb</b></div>
  <div id="fps">-- fps</div>
  <div id="loader">Loading model…</div>
  <div id="controls">
    <label>Quality:
      <select id="quality">
        <option value="high">High</option>
        <option value="medium" selected>Medium</option>
        <option value="low">Low</option>
      </select>
    </label>
    <label><input type="checkbox" id="autorotate" /> Auto-rotate</label>
    <label><input type="checkbox" id="wireframe" /> Wireframe</label>
    <label>Zoom speed: <input type="range" id="zoomSpeed" min="0.5" max="5" step="0.1" value="1.8" /></label>
    <button id="resetView" style="margin-top:4px;">Reset view</button>
    <div style="margin-top:4px; color:#555;">Drag: rotate &middot; Right-drag: pan &middot; Scroll: zoom</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
    import { Sky } from 'three/addons/objects/Sky.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    // ------ Renderer ------
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: 'high-performance',
      stencil: false,
    });
    // Cap pixel ratio so hi-DPI screens don't render 4-9x pixels
    renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.NeutralToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFShadowMap; // cheaper than PCFSoft
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.01, 5000);
    camera.position.set(3, 1.8, 4);

    // ------ Sky as backdrop only ------
    const skyShader = new Sky();
    skyShader.scale.setScalar(1000);
    scene.add(skyShader);

    const sun = new THREE.Vector3();
    const u = skyShader.material.uniforms;
    u.turbidity.value = 6;
    u.rayleigh.value = 1.5;
    u.mieCoefficient.value = 0.005;
    u.mieDirectionalG.value = 0.8;
    sun.setFromSphericalCoords(1, THREE.MathUtils.degToRad(35), THREE.MathUtils.degToRad(135));
    u.sunPosition.value.copy(sun);

    // ------ Neutral studio environment for PBR (matches Blender's default studio light) ------
    // Using RoomEnvironment keeps reflections neutral so materials look like they do in Blender's
    // Material Preview / Rendered view with default studio HDRI, instead of tinted by blue sky.
    const pmrem = new THREE.PMREMGenerator(renderer);
    pmrem.compileEquirectangularShader();
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    pmrem.dispose();

    // ------ Lights (match Blender default: warm key + cool fill + soft ambient) ------
    const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
    sunLight.position.copy(sun).multiplyScalar(50);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(1024, 1024);
    sunLight.shadow.camera.near = 0.1;
    sunLight.shadow.camera.far = 200;
    sunLight.shadow.bias = -0.0005;
    sunLight.shadow.autoUpdate = false;
    scene.add(sunLight);
    scene.add(new THREE.HemisphereLight(0xffffff, 0xb9a27a, 0.35));

    // ------ Ground ------
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: 0x8fae6a, roughness: 1.0, metalness: 0.0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(50, 50, 0x446633, 0x5e8a3e);
    grid.position.y = 0.001;
    grid.material.transparent = true;
    grid.material.opacity = 0.35;
    scene.add(grid);

    // ------ Controls ------
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = false;
    controls.autoRotateSpeed = 0.8;
    controls.zoomSpeed = 1.8;
    controls.screenSpacePanning = true;
    controls.minDistance = 0.001;
    controls.maxDistance = Infinity;
    controls.maxPolarAngle = Math.PI / 2 - 0.02;

    // ------ On-demand rendering ------
    // We only render when something changes (interaction, rotation, animation, load).
    let needsRender = true;
    const requestRender = () => { needsRender = true; };
    controls.addEventListener('change', requestRender);

    let mixer = null;
    const clock = new THREE.Clock();
    let initialCamPos = null, initialTarget = null;
    let wireframe = false;

    // ------ Load the GLB ------
    const draco = new DRACOLoader();
    draco.setDecoderPath('https://unpkg.com/three@0.161.0/examples/jsm/libs/draco/');
    const loader = new GLTFLoader().setDRACOLoader(draco);

    let wheelParts = [];
    let drivetrain = null;

    function median(values) {
      if (!values.length) return 0;
      const sorted = values.slice().sort((a, b) => a - b);
      return sorted[Math.floor(sorted.length / 2)];
    }

    function isModelChainMesh(mesh) {
      const match = mesh.name.match(/^polySurface(\d+)_steel_0$/);
      if (!match) return false;
      const id = Number(match[1]);
      return id >= 530 && id <= 781;
    }

    function removePreviewArtifacts(allMeshes) {
      const artifactNames = new Set([
        'pasted__polySurface392_pasted__steel1_0'
      ]);

      allMeshes.forEach((mesh) => {
        if (artifactNames.has(mesh.name)) {
          mesh.parent?.remove(mesh);
        }
      });
    }

    function createDrivetrain(scene, allMeshes) {
      const chainMeshes = allMeshes.filter(isModelChainMesh);
      if (!chainMeshes.length) return null;

      const findMesh = (name) => allMeshes.find((m) => m.name === name);
      const frontReference = findMesh('pCylinder83_rim_0') || findMesh('polySurface796_rim_0');
      const rearReference = findMesh('pCylinder103_steel_0') || findMesh('polySurface133_steel_0');
      if (!frontReference || !rearReference) return null;

      const chainZ = chainMeshes.reduce((sum, m) => sum + m.userData.worldCenter.z, 0) / chainMeshes.length;
      const frontPivotCenter = frontReference.userData.worldCenter.clone();
      const rearPivotCenter = rearReference.userData.worldCenter.clone();
      const frontCenter = frontPivotCenter.clone();
      const rearCenter = rearPivotCenter.clone();
      frontCenter.z = chainZ;
      rearCenter.z = chainZ;

      const frontDistances = chainMeshes
        .filter((m) => m.userData.worldCenter.x > frontCenter.x - 0.0045)
        .map((m) => Math.hypot(m.userData.worldCenter.x - frontCenter.x, m.userData.worldCenter.y - frontCenter.y));
      const rearDistances = chainMeshes
        .filter((m) => m.userData.worldCenter.x < rearCenter.x + 0.0045)
        .map((m) => Math.hypot(m.userData.worldCenter.x - rearCenter.x, m.userData.worldCenter.y - rearCenter.y));
      const rearBox = new THREE.Box3().setFromObject(rearReference);
      const rearBoxSize = rearBox.getSize(new THREE.Vector3());
      const rearToothTipRadius = Math.max(rearBoxSize.x, rearBoxSize.y) * 0.5;

      const frontRadius = THREE.MathUtils.clamp(median(frontDistances), 0.0045, 0.009);
      const rearRadius = THREE.MathUtils.clamp(rearToothTipRadius * 0.88, 0.0024, median(rearDistances));

      const dir = new THREE.Vector3().subVectors(rearCenter, frontCenter);
      dir.z = 0;
      const distance = dir.length();
      dir.normalize();
      const perp = new THREE.Vector3(dir.y, -dir.x, 0).normalize();
      const phi = Math.asin((frontRadius - rearRadius) / distance);
      const topLength = distance * Math.cos(phi);
      const rearArcLength = rearRadius * (Math.PI - 2 * phi);
      const bottomLength = distance * Math.cos(phi);
      const frontArcLength = frontRadius * (Math.PI + 2 * phi);
      const totalLength = topLength + rearArcLength + bottomLength + frontArcLength;
      const linkCount = Math.max(1, Math.round(chainMeshes.length / 3));
      const pitch = totalLength / linkCount;

      const frontTop = new THREE.Vector2(frontRadius * Math.sin(phi), frontRadius * Math.cos(phi));
      const rearTop = new THREE.Vector2(distance + rearRadius * Math.sin(phi), rearRadius * Math.cos(phi));
      const frontBottom = new THREE.Vector2(frontRadius * Math.sin(phi), -frontRadius * Math.cos(phi));
      const rearBottom = new THREE.Vector2(distance + rearRadius * Math.sin(phi), -rearRadius * Math.cos(phi));

      const toWorld = (point) => frontCenter.clone().addScaledVector(dir, point.x).addScaledVector(perp, point.y);
      const toWorldTangent = (tangent) => new THREE.Vector3().addScaledVector(dir, tangent.x).addScaledVector(perp, tangent.y).normalize();
      const getChainState = (value) => {
        let d = value % totalLength;
        if (d < 0) d += totalLength;
        const p = new THREE.Vector2();
        const t = new THREE.Vector2();
        if (d < topLength) {
          const u = d / topLength;
          p.set(frontTop.x + u * (rearTop.x - frontTop.x), frontTop.y + u * (rearTop.y - frontTop.y));
          t.subVectors(rearTop, frontTop).normalize();
        } else if (d < topLength + rearArcLength) {
          const u = (d - topLength) / rearArcLength;
          const angle = (Math.PI / 2 - phi) - u * (Math.PI - 2 * phi);
          p.set(distance + rearRadius * Math.cos(angle), rearRadius * Math.sin(angle));
          t.set(Math.sin(angle), -Math.cos(angle));
        } else if (d < topLength + rearArcLength + bottomLength) {
          const u = (d - topLength - rearArcLength) / bottomLength;
          p.set(rearBottom.x + u * (frontBottom.x - rearBottom.x), rearBottom.y + u * (frontBottom.y - rearBottom.y));
          t.subVectors(frontBottom, rearBottom).normalize();
        } else {
          const u = (d - topLength - rearArcLength - bottomLength) / frontArcLength;
          const angle = (-Math.PI / 2 + phi) - u * (Math.PI + 2 * phi);
          p.set(frontRadius * Math.cos(angle), frontRadius * Math.sin(angle));
          t.set(Math.sin(angle), -Math.cos(angle));
        }
        const position = toWorld(p);
        position.z = chainZ;
        const tangent = toWorldTangent(t);
        return { position, angle: Math.atan2(tangent.y, tangent.x) };
      };

      const sampleCount = 720;
      const samples = [];
      for (let i = 0; i < sampleCount; i++) {
        const s = (i / sampleCount) * totalLength;
        samples.push({ s, ...getChainState(s) });
      }
      const chainItems = chainMeshes.map((mesh) => {
        const center = mesh.userData.worldCenter;
        let closest = samples[0];
        let closestDistance = Infinity;
        samples.forEach((sample) => {
          const dx = center.x - sample.position.x;
          const dy = center.y - sample.position.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < closestDistance) {
            closestDistance = d2;
            closest = sample;
          }
        });
        return {
          mesh,
          center,
          pathOffset: closest.s
        };
      }).sort((a, b) => a.pathOffset - b.pathOffset);

      let seamIndex = 0;
      let biggestGap = -Infinity;
      for (let i = 0; i < chainItems.length; i++) {
        const current = chainItems[i].pathOffset;
        const next = chainItems[(i + 1) % chainItems.length].pathOffset + (i === chainItems.length - 1 ? totalLength : 0);
        const gap = next - current;
        if (gap > biggestGap) {
          biggestGap = gap;
          seamIndex = (i + 1) % chainItems.length;
        }
      }

      const orderedChainItems = chainItems.slice(seamIndex).concat(chainItems.slice(0, seamIndex));
      const seamStart = orderedChainItems[0].pathOffset;
      orderedChainItems.forEach((item) => {
        item.unwrappedPathOffset = item.pathOffset < seamStart ? item.pathOffset + totalLength : item.pathOffset;
      });

      const meshesPerLink = Math.max(1, Math.round(orderedChainItems.length / linkCount));
      const rawLinkGroups = [];
      for (let i = 0; i < linkCount; i++) {
        const members = orderedChainItems.slice(i * meshesPerLink, (i + 1) * meshesPerLink);
        if (!members.length) continue;
        const center = members.reduce((sum, item) => sum.add(item.center), new THREE.Vector3()).divideScalar(members.length);
        const averagePathOffset = members.reduce((sum, item) => sum + item.unwrappedPathOffset, 0) / members.length;
        rawLinkGroups.push({ members, center, averagePathOffset });
      }

      const baseOffset = rawLinkGroups.reduce((sum, group, index) => sum + group.averagePathOffset - index * pitch, 0) / rawLinkGroups.length;
      const chainParts = rawLinkGroups.map((group, index) => {
        const pathOffset = (baseOffset + index * pitch) % totalLength;
        const state = getChainState(pathOffset);
        const pivot = new THREE.Group();
        pivot.name = 'ChainLinkMover_' + index;
        pivot.position.copy(group.center);
        scene.add(pivot);
        group.members.forEach((item) => pivot.attach(item.mesh));
        return {
          pivot,
          pathOffset,
          startAngle: state.angle
        };
      });

      const makePivot = (name, center, names) => {
        const pivot = new THREE.Group();
        pivot.name = name;
        pivot.position.copy(center);
        scene.add(pivot);
        names
          .map((name) => findMesh(name))
          .filter(Boolean)
          .forEach((mesh) => pivot.attach(mesh));
        return pivot;
      };

      const frontPivot = makePivot('FrontSprocketPivot', frontPivotCenter, [
        'polySurface796_tire_0',
        'polySurface796_rim_0',
        'polySurface796_steel_0',
        'pCylinder83_rim_0',
        'pCylinder84_tire_0',
        'pCylinder5_wheel_0',
        'pCylinder77_steel_0',
        'pCylinder81_steel_0',
        'pCylinder82_steel_0',
        'pCylinder107_steel_0',
        'pCylinder108_steel_0',
        'pasted__pCylinder32_rim_0',
        'pasted__pCylinder33_rim_0',
        'pasted__pCylinder34_rim_0',
        'pasted__pCylinder35_rim_0',
        'pasted__pCylinder36_rim_0'
      ]);
      const rearPivot = makePivot('RearSprocketPivot', rearPivotCenter, [
        'pCylinder103_steel_0'
      ]);

      let offset = 0;
      const speed = totalLength * 0.35;
      const frontPhase = Math.PI / 2 - phi;
      const rearPhase = (Math.PI / 2 - phi) - (topLength / rearRadius);

      return {
        update(dt) {
          offset += speed * dt;
          frontPivot.rotation.z = -offset / frontRadius + frontPhase;
          rearPivot.rotation.z = -offset / rearRadius + rearPhase;
          chainParts.forEach((part) => {
            const state = getChainState(part.pathOffset + offset);
            part.pivot.position.copy(state.position);
            part.pivot.rotation.z = state.angle - part.startAngle;
          });
        }
      };
    }

    loader.load(
      './cycle.glb',
      (gltf) => {
        const model = gltf.scene;
        const allMeshes = [];

        model.traverse((o) => {
          if (o.isMesh) {
            o.castShadow = true;
            o.receiveShadow = true;
            allMeshes.push(o);

            if (o.geometry && !o.geometry.boundingSphere) o.geometry.computeBoundingSphere();
            if (o.geometry && !o.geometry.boundingBox) o.geometry.computeBoundingBox();
            const mats = Array.isArray(o.material) ? o.material : [o.material];
            mats.forEach((m) => {
              if (!m) return;
              if (m.map) m.map.colorSpace = THREE.SRGBColorSpace;
              if (m.emissiveMap) m.emissiveMap.colorSpace = THREE.SRGBColorSpace;
              m.needsUpdate = true;
            });
          }
        });
        removePreviewArtifacts(allMeshes);
        scene.add(model);

        // Ground & center the model FIRST so all world coords below are stable
        const initBox = new THREE.Box3().setFromObject(model);
        const initSize = initBox.getSize(new THREE.Vector3());
        const initCenter = initBox.getCenter(new THREE.Vector3());
        model.position.x -= initCenter.x;
        model.position.z -= initCenter.z;
        model.position.y -= initBox.min.y;
        model.updateMatrixWorld(true);

        // ---- Detect wheels via geometric clustering ----
        // 1) For every mesh, get its world-space bounding sphere center & radius
        allMeshes.forEach((m) => {
          if (!m.geometry.boundingSphere) m.geometry.computeBoundingSphere();
          const sphere = m.geometry.boundingSphere.clone();
          sphere.applyMatrix4(m.matrixWorld);
          m.userData.worldCenter = sphere.center.clone();
          m.userData.worldRadius = sphere.radius;
        });

        // 2) Collect tire+rim meshes – these are reliable wheel anchors
        const isMainWheelMesh = (m, materialPattern = '(tire|rim|wheel)') => {
          const match = m.name.match(new RegExp(`^polySurface(\\d+)_${materialPattern}_0$`));
          if (!match) return false;
          const id = Number(match[1]);
          return (id >= 92 && id <= 138) || (id >= 152 && id <= 198);
        };
        const wheelAccessoryNames = new Set([
          'polySurface804_tire_0',
          'polySurface805_rim_0',
          'pCylinder109_rim_0',
          'pCylinder110_tire_0'
        ]);
        const isWheelAccessoryMesh = (m) => wheelAccessoryNames.has(m.name);
        const wheelAnchors = allMeshes.filter(
          (m) => isMainWheelMesh(m, '(tire|rim)') && m.userData.worldRadius > 0.02
        );

        // 3) Determine main bike length axis (X or Z, whichever is longer horizontally)
        const lengthAxis = initSize.x >= initSize.z ? 'x' : 'z';

        // 4) k-means (k=2) along the length axis to split front vs rear wheel
        let cA = wheelAnchors[0].userData.worldCenter.clone();
        let cB = wheelAnchors[wheelAnchors.length - 1].userData.worldCenter.clone();
        // Seed at extremes along length axis
        wheelAnchors.forEach((m) => {
          const v = m.userData.worldCenter[lengthAxis];
          if (v < cA[lengthAxis]) cA = m.userData.worldCenter.clone();
          if (v > cB[lengthAxis]) cB = m.userData.worldCenter.clone();
        });

        for (let iter = 0; iter < 12; iter++) {
          const sumA = new THREE.Vector3(), sumB = new THREE.Vector3();
          let nA = 0, nB = 0;
          wheelAnchors.forEach((m) => {
            const c = m.userData.worldCenter;
            if (c.distanceToSquared(cA) < c.distanceToSquared(cB)) {
              sumA.add(c); nA++;
            } else {
              sumB.add(c); nB++;
            }
          });
          if (nA > 0) cA.copy(sumA.divideScalar(nA));
          if (nB > 0) cB.copy(sumB.divideScalar(nB));
        }
        const wheelCenters = [cA, cB];

        // 5) Estimate each wheel's effective radius: max distance from cluster
        //    centroid to any anchor mesh's outer edge (centerDist + meshRadius)
        const wheelRadii = [0, 0];
        wheelAnchors.forEach((m) => {
          const c = m.userData.worldCenter;
          const dA = c.distanceTo(cA);
          const dB = c.distanceTo(cB);
          const reach = m.userData.worldRadius;
          if (dA < dB) wheelRadii[0] = Math.max(wheelRadii[0], dA + reach);
          else wheelRadii[1] = Math.max(wheelRadii[1], dB + reach);
        });

        // 6) Gather ALL meshes (spokes, hub, tire pieces, rim pieces) that fall
        //    inside each wheel's sphere. Closest wheel wins.
        const wheelMembers = [[], []];
        const wheelCandidates = allMeshes.filter((m) => isMainWheelMesh(m) || isWheelAccessoryMesh(m));
        wheelCandidates.forEach((m) => {
          const c = m.userData.worldCenter;
          const dA = c.distanceTo(cA);
          const dB = c.distanceTo(cB);
          // Mesh must lie within the closer wheel's bounds (with tiny margin
          // so we don't include frame parts that pass near the hub)
          if (dA < dB) {
            if (dA <= wheelRadii[0] * 0.98) wheelMembers[0].push(m);
          } else {
            if (dB <= wheelRadii[1] * 0.98) wheelMembers[1].push(m);
          }
        });

        // 7) Compute axle axis: perpendicular to (wheel-to-wheel, up)
        const forward = new THREE.Vector3().subVectors(cA, cB).normalize();
        const up = new THREE.Vector3(0, 1, 0);
        const axleAxis = new THREE.Vector3().crossVectors(forward, up).normalize();

        // 8) For each wheel, build a pivot Group at the hub, attach() the
        //    member meshes (preserves their visual transform), and store axis.
        const wheelPivots = [];
        for (let i = 0; i < 2; i++) {
          const pivot = new THREE.Group();
          pivot.name = 'WheelPivot_' + i;
          pivot.position.copy(wheelCenters[i]);
          scene.add(pivot);
          wheelMembers[i].forEach((m) => pivot.attach(m));
          pivot.userData.axleAxis = axleAxis;
          wheelPivots.push(pivot);
        }
        wheelParts = wheelPivots; // re-used by tick()
        drivetrain = createDrivetrain(scene, allMeshes);

        console.log(
          'Wheel A members:', wheelMembers[0].length,
          '| Wheel B members:', wheelMembers[1].length,
          '| Axle axis:', axleAxis
        );

        // Note: wheel meshes are now children of scene-level pivot Groups, so
        // setFromObject(model) would miss them. Use the pre-grouping box.
        const newCenter = new THREE.Vector3(0, initSize.y / 2, 0);
        const diag = initSize.length();

        // Camera framing
        camera.near = Math.max(0.001, diag / 1000);
        camera.far = Math.max(5000, diag * 500);
        const camOffset = new THREE.Vector3(1.1, 0.55, 1.4).normalize().multiplyScalar(diag * 1.3);
        camera.position.copy(newCenter).add(camOffset);
        camera.lookAt(newCenter);
        camera.updateProjectionMatrix();
        controls.target.copy(newCenter);
        controls.minDistance = diag * 0.05;
        controls.maxDistance = diag * 30;

        initialCamPos = camera.position.clone();
        initialTarget = newCenter.clone();

        // Fit shadow frustum tight to the model
        const sx = Math.max(initSize.x, initSize.z) * 1.2;
        const sy = initSize.y * 1.2;
        sunLight.shadow.camera.left = -sx;
        sunLight.shadow.camera.right = sx;
        sunLight.shadow.camera.top = sy;
        sunLight.shadow.camera.bottom = -sy;
        sunLight.shadow.camera.updateProjectionMatrix();

        // Precompile shaders to avoid first-frame hitches
        renderer.compile(scene, camera);

        // Render the shadow map exactly once for the static scene
        sunLight.shadow.needsUpdate = true;

        // Disabled built-in animations to keep all other parts stable
        /*
        if (gltf.animations && gltf.animations.length) {
          mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach((clip) => mixer.clipAction(clip).play());
          document.getElementById('info').innerHTML += ` &middot; <b>${gltf.animations.length}</b> anim`;
        }
        */

        document.getElementById('loader').remove();
        requestRender();
      },
      (xhr) => {
        if (xhr.total) {
          const pct = ((xhr.loaded / xhr.total) * 100).toFixed(0);
          document.getElementById('loader').textContent = `Loading model… ${pct}%`;
        }
      },
      (err) => {
        console.error(err);
        document.getElementById('loader').textContent = 'Failed to load cycle.glb';
      }
    );

    // ------ UI ------
    document.getElementById('autorotate').addEventListener('change', (e) => {
      controls.autoRotate = e.target.checked;
      requestRender();
    });
    document.getElementById('wireframe').addEventListener('change', (e) => {
      wireframe = e.target.checked;
      scene.traverse((o) => {
        if (o.isMesh && o.material) {
          const mats = Array.isArray(o.material) ? o.material : [o.material];
          mats.forEach((m) => (m.wireframe = wireframe));
        }
      });
      requestRender();
    });
    document.getElementById('zoomSpeed').addEventListener('input', (e) => {
      controls.zoomSpeed = parseFloat(e.target.value);
    });
    document.getElementById('resetView').addEventListener('click', () => {
      if (!initialCamPos) return;
      camera.position.copy(initialCamPos);
      controls.target.copy(initialTarget);
      controls.update();
      requestRender();
    });
    document.getElementById('quality').addEventListener('change', (e) => {
      applyQuality(e.target.value);
      requestRender();
    });

    function applyQuality(level) {
      if (level === 'high') {
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        sunLight.shadow.mapSize.set(2048, 2048);
        sunLight.shadow.map?.dispose();
        sunLight.shadow.map = null;
      } else if (level === 'medium') {
        renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
        renderer.shadowMap.enabled = true;
        sunLight.shadow.mapSize.set(1024, 1024);
        sunLight.shadow.map?.dispose();
        sunLight.shadow.map = null;
      } else {
        renderer.setPixelRatio(1);
        renderer.shadowMap.enabled = false;
      }
      sunLight.shadow.needsUpdate = true; // regenerate once
    }

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      requestRender();
    });

    // ------ Render loop with FPS meter + on-demand rendering ------
    const fpsEl = document.getElementById('fps');
    let frames = 0, last = performance.now();

    function tick() {
      requestAnimationFrame(tick);
      const dt = clock.getDelta();

      // If anything is animating, we need to render every frame
      const animating = controls.autoRotate || mixer || wheelParts.length > 0 || drivetrain;
      if (animating) needsRender = true;

      if (mixer) mixer.update(dt);
      if (controls.autoRotate) controls.update();
      else if (controls.enableDamping) controls.update();

      // Spin each wheel pivot around its real-world axle axis
      const spinSpeed = dt * 4; // radians/sec – tweak to taste
      wheelParts.forEach((pivot) => {
        const axis = pivot.userData.axleAxis;
        if (axis) pivot.rotateOnWorldAxis(axis, spinSpeed);
      });
      if (drivetrain) drivetrain.update(dt);

      if (needsRender) {
        renderer.render(scene, camera);
        needsRender = false;
        frames++;
      }

      const now = performance.now();
      if (now - last >= 500) {
        const fps = (frames * 1000 / (now - last)).toFixed(0);
        const info = renderer.info;
        fpsEl.textContent = `${fps} fps · ${info.render.triangles.toLocaleString()} tris · ${info.render.calls} calls`;
        frames = 0;
        last = now;
      }
    }
    tick();
  </script>
</body>
</html>
