<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bicycle Chain & Sprocket Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 30px;
            color: #fff;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        h1 { margin: 0 0 5px 0; font-size: 1.2rem; font-weight: 600; letter-spacing: 1px; }
        p { margin: 0; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui">
        <h1>DRIVETRAIN SIMULATION</h1>
        <p>Left Click: Rotate | Right Click: Pan | Scroll: Zoom</p>
    </div>

    <!-- Import Maps for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configuration & Physics Constants ---
        const N1 = 44;             // Front gear teeth
        const N2 = 16;             // Rear gear teeth
        const PITCH = 1.0;         // Chain pitch (distance between pins)
        const TARGET_LINKS = 80;   // Target number of chain links (must be even)
        
        // --- Mathematical Solver ---
        // Iteratively solves for the exact distance (D) between gear centers 
        // to ensure the chain perfectly wraps without fractional links.
        function calculateExactD(n1, n2, p, targetLinks) {
            const r1 = n1 * p / (2 * Math.PI);
            const r2 = n2 * p / (2 * Math.PI);
            const targetL = targetLinks * p;

            let dMin = r1 - r2; 
            let dMax = targetL;
            let D = (dMin + dMax) / 2;

            for (let i = 0; i < 50; i++) {
                let phi = Math.asin((r1 - r2) / D);
                let L = 2 * D * Math.cos(phi) + r2 * (Math.PI - 2 * phi) + r1 * (Math.PI + 2 * phi);
                if (L > targetL) dMax = D;
                else dMin = D;
                D = (dMin + dMax) / 2;
            }
            return D;
        }

        const D = calculateExactD(N1, N2, PITCH, TARGET_LINKS);
        const R1 = N1 * PITCH / (2 * Math.PI);
        const R2 = N2 * PITCH / (2 * Math.PI);
        const PHI = Math.asin((R1 - R2) / D);

        const C1 = new THREE.Vector2(-D / 2, 0);
        const C2 = new THREE.Vector2(D / 2, 0);

        // Path segment lengths
        const L_TOP = D * Math.cos(PHI);
        const L_ARC2 = R2 * (Math.PI - 2 * PHI);
        const L_BOT = D * Math.cos(PHI);
        const L_ARC1 = R1 * (Math.PI + 2 * PHI);
        const L_TOTAL = L_TOP + L_ARC2 + L_BOT + L_ARC1; // Should equal TARGET_LINKS * PITCH

        // Tangent points for straight chain sections
        const T1_TOP = new THREE.Vector2(C1.x + R1 * Math.sin(PHI), C1.y + R1 * Math.cos(PHI));
        const T2_TOP = new THREE.Vector2(C2.x + R2 * Math.sin(PHI), C2.y + R2 * Math.cos(PHI));
        const T1_BOT = new THREE.Vector2(C1.x + R1 * Math.sin(PHI), C1.y - R1 * Math.cos(PHI));
        const T2_BOT = new THREE.Vector2(C2.x + R2 * Math.sin(PHI), C2.y - R2 * Math.cos(PHI));

        // Returns {pos, tangent} for any distance 'd' along the continuous chain path
        function getChainState(d) {
            d = d % L_TOTAL;
            if (d < 0) d += L_TOTAL;

            const pos = new THREE.Vector3();
            if (d < L_TOP) {
                let u = d / L_TOP;
                pos.set(T1_TOP.x + u * (T2_TOP.x - T1_TOP.x), T1_TOP.y + u * (T2_TOP.y - T1_TOP.y), 0);
            } else if (d < L_TOP + L_ARC2) {
                let u = (d - L_TOP) / L_ARC2;
                let angle = (Math.PI / 2 - PHI) - u * (Math.PI - 2 * PHI);
                pos.set(C2.x + R2 * Math.cos(angle), C2.y + R2 * Math.sin(angle), 0);
            } else if (d < L_TOP + L_ARC2 + L_BOT) {
                let u = (d - L_TOP - L_ARC2) / L_BOT;
                pos.set(T2_BOT.x + u * (T1_BOT.x - T2_BOT.x), T2_BOT.y + u * (T1_BOT.y - T2_BOT.y), 0);
            } else {
                let u = (d - L_TOP - L_ARC2 - L_BOT) / L_ARC1;
                let angle = (-Math.PI / 2 + PHI) - u * (Math.PI + 2 * PHI);
                pos.set(C1.x + R1 * Math.cos(angle), C1.y + R1 * Math.sin(angle), 0);
            }
            return pos;
        }

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.01);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, -10, 45);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
        scene.add(ambientLight);

        const keyLight = new THREE.DirectionalLight(0xffffff, 2);
        keyLight.position.set(10, 20, 15);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 2048;
        keyLight.shadow.mapSize.height = 2048;
        keyLight.shadow.camera.left = -25;
        keyLight.shadow.camera.right = 25;
        keyLight.shadow.camera.top = 15;
        keyLight.shadow.camera.bottom = -15;
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0x88bbff, 1.5);
        fillLight.position.set(-15, 10, -15);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xffaa55, 1);
        rimLight.position.set(0, -15, 10);
        scene.add(rimLight);

        // Materials
        const gearMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.3 });
        const cogMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.4 });
        const plateOuterMat = new THREE.MeshStandardMaterial({ color: 0x9a9a9a, metalness: 0.85, roughness: 0.35 });
        const plateInnerMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.8, roughness: 0.5 });
        const pinMat = new THREE.MeshStandardMaterial({ color: 0x8f8f8f, metalness: 0.9, roughness: 0.4 });

        // --- Gear Generation ---
        function createSprocketGeo(N, isFront) {
            const shape = new THREE.Shape();
            const R_pitch = N * PITCH / (2 * Math.PI);
            const r_roller = 0.3 * PITCH;
            const R_root = R_pitch - r_roller + 0.02;
            const R_outer = R_pitch + 0.25 * PITCH;
            const delta = Math.PI * 2 / N;

            for (let i = 0; i < N; i++) {
                let a = i * delta;
                let a_tip = a + delta / 2;

                if (i === 0) shape.moveTo(R_outer * Math.cos(a - delta / 4), R_outer * Math.sin(a - delta / 4));
                else shape.lineTo(R_outer * Math.cos(a - delta / 4), R_outer * Math.sin(a - delta / 4));

                shape.lineTo(R_root * Math.cos(a - delta / 8), R_root * Math.sin(a - delta / 8));
                shape.lineTo(R_root * Math.cos(a), R_root * Math.sin(a));
                shape.lineTo(R_root * Math.cos(a + delta / 8), R_root * Math.sin(a + delta / 8));

                shape.lineTo(R_outer * Math.cos(a_tip - delta / 8), R_outer * Math.sin(a_tip - delta / 8));
                shape.lineTo(R_outer * Math.cos(a_tip), R_outer * Math.sin(a_tip));
                shape.lineTo(R_outer * Math.cos(a_tip + delta / 8), R_outer * Math.sin(a_tip + delta / 8));
            }

            // Cutouts / Spokes
            const holeRadius = R_root - (isFront ? 1.5 : 0.8);
            if (isFront && holeRadius > 2.0) {
                const numSpokes = 5;
                for (let i = 0; i < numSpokes; i++) {
                    const hPath = new THREE.Path();
                    const aCenter = i * Math.PI * 2 / numSpokes;
                    const innerR = 1.2;
                    const outerR = holeRadius;
                    const halfAngle = (Math.PI * 2 / numSpokes) * 0.35;
                    hPath.moveTo(innerR * Math.cos(aCenter - halfAngle), innerR * Math.sin(aCenter - halfAngle));
                    hPath.lineTo(outerR * Math.cos(aCenter - halfAngle), outerR * Math.sin(aCenter - halfAngle));
                    hPath.absarc(0, 0, outerR, aCenter - halfAngle, aCenter + halfAngle, false);
                    hPath.lineTo(innerR * Math.cos(aCenter + halfAngle), innerR * Math.sin(aCenter + halfAngle));
                    hPath.absarc(0, 0, innerR, aCenter + halfAngle, aCenter - halfAngle, true);
                    shape.holes.push(hPath);
                }
            } else if (!isFront) {
                const hPath = new THREE.Path();
                hPath.absarc(0, 0, holeRadius, 0, Math.PI * 2, false);
                shape.holes.push(hPath);
            }

            const extrudeSettings = { depth: 0.12, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.04, bevelThickness: 0.04 };
            const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            geo.center();
            return geo;
        }

        // Crankset (Front)
        const crankGroup = new THREE.Group();
        const gear1Geo = createSprocketGeo(N1, true);
        const gear1Mesh = new THREE.Mesh(gear1Geo, gearMat);
        gear1Mesh.castShadow = true;
        gear1Mesh.receiveShadow = true;

        const crankArmGeo = new THREE.BoxGeometry(8, 0.8, 0.4);
        crankArmGeo.translate(4, 0, 0);
        
        const rightArm = new THREE.Mesh(crankArmGeo, gearMat);
        rightArm.position.z = 0.5;
        rightArm.castShadow = true;

        const leftArm = new THREE.Mesh(crankArmGeo, gearMat);
        leftArm.rotation.z = Math.PI;
        leftArm.position.z = -0.5;
        leftArm.castShadow = true;

        const pedalGeo = new THREE.BoxGeometry(1.5, 0.4, 2.5);
        const rightPedal = new THREE.Mesh(pedalGeo, gearMat);
        rightPedal.position.set(8, 0, 1.8);
        rightPedal.castShadow = true;

        const leftPedal = new THREE.Mesh(pedalGeo, gearMat);
        leftPedal.position.set(-8, 0, -1.8);
        leftPedal.castShadow = true;

        crankGroup.add(gear1Mesh, rightArm, leftArm, rightPedal, leftPedal);
        crankGroup.position.set(C1.x, C1.y, 0);
        scene.add(crankGroup);

        // Rear Cog
        const gear2Geo = createSprocketGeo(N2, false);
        const gear2Mesh = new THREE.Mesh(gear2Geo, cogMat);
        gear2Mesh.position.set(C2.x, C2.y, 0);
        gear2Mesh.castShadow = true;
        gear2Mesh.receiveShadow = true;
        scene.add(gear2Mesh);

        // --- Chain Generation ---
        const chainGroup = new THREE.Group();
        scene.add(chainGroup);

        const plateShape = new THREE.Shape();
        plateShape.absarc(0, 0, 0.22, Math.PI/2, 3*Math.PI/2, false);
        plateShape.absarc(PITCH, 0, 0.22, 3*Math.PI/2, Math.PI/2, false);
        const plateGeoRaw = new THREE.ExtrudeGeometry(plateShape, { depth: 0.05, bevelEnabled: true, bevelSize: 0.02, bevelThickness: 0.02 });
        plateGeoRaw.translate(-PITCH/2, 0, -0.025); // Center locally

        const rollerGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.35, 16);
        rollerGeo.rotateX(Math.PI/2);

        const pinGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.65, 16);
        pinGeo.rotateX(Math.PI/2);

        const chainLinks = [];

        for (let i = 0; i < TARGET_LINKS; i++) {
            const isOuter = i % 2 === 0;
            const mat = isOuter ? plateOuterMat : plateInnerMat;
            const zOffset = isOuter ? 0.22 : 0.12;

            const plateL = new THREE.Mesh(plateGeoRaw, mat);
            const plateR = new THREE.Mesh(plateGeoRaw, mat);
            plateL.castShadow = true; plateR.castShadow = true;
            chainGroup.add(plateL, plateR);

            const pin = new THREE.Mesh(pinGeo, pinMat);
            pin.castShadow = true;
            chainGroup.add(pin);

            let roller = null;
            if (!isOuter) {
                roller = new THREE.Mesh(rollerGeo, plateOuterMat);
                roller.castShadow = true;
                chainGroup.add(roller);
            }

            chainLinks.push({ plateL, plateR, pin, roller, zOffset, isOuter });
        }

        // --- Animation Loop ---
        let chainOffset = 0;
        const SPEED = 8.0; // Units per second
        const clock = new THREE.Clock();

        // Phase offsets to perfectly align gear teeth with chain valleys
        const phase1 = (Math.PI / 2 - PHI);
        const phase2 = (Math.PI / 2 - PHI) - (L_TOP / R2);

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            
            // Move chain forward
            chainOffset = (chainOffset + SPEED * dt) % L_TOTAL;

            // Rotate gears perfectly in sync with chain distance
            const gear1Angle = -chainOffset / R1 + phase1;
            crankGroup.rotation.z = gear1Angle;
            gear2Mesh.rotation.z = -chainOffset / R2 + phase2;

            // Counter-rotate pedals to keep them horizontal
            rightPedal.rotation.z = -gear1Angle;
            leftPedal.rotation.z = -gear1Angle;

            // Update chain meshes
            for (let i = 0; i < TARGET_LINKS; i++) {
                const d1 = (i * PITCH + chainOffset) % L_TOTAL;
                const d2 = ((i + 1) * PITCH + chainOffset) % L_TOTAL;

                const p1 = getChainState(d1);
                const p2 = getChainState(d2);

                const link = chainLinks[i];

                // Position Pin and Roller at start of link
                link.pin.position.copy(p1);
                if (link.roller) link.roller.position.copy(p1);

                // Position Plates halfway between pins, rotated to connect them
                const midX = (p1.x + p2.x) / 2;
                const midY = (p1.y + p2.y) / 2;
                const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);

                link.plateL.position.set(midX, midY, link.zOffset);
                link.plateL.rotation.z = angle;

                link.plateR.position.set(midX, midY, -link.zOffset);
                link.plateR.rotation.z = angle;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start animation
        animate();
    </script>
</body>
</html>
