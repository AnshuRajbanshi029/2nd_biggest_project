<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lightweight Car Preview</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #070914;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(59, 130, 246, 0.22), transparent 34rem),
          radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.16), transparent 30rem),
          #070914;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .hud {
        position: fixed;
        top: 20px;
        left: 20px;
        right: 20px;
        z-index: 5;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        pointer-events: none;
      }

      .panel {
        pointer-events: auto;
        max-width: 430px;
        padding: 16px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(24px, 4vw, 42px);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.45;
      }

      .controls {
        pointer-events: auto;
        display: grid;
        gap: 10px;
        min-width: min(320px, calc(100vw - 40px));
        padding: 12px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.68);
        backdrop-filter: blur(18px);
      }

      .grid-stack {
        display: grid;
        gap: 10px;
      }

      .actions {
        display: grid;
        gap: 10px;
        padding-top: 8px;
        margin-top: 4px;
        border-top: 1px solid rgba(148, 163, 184, 0.18);
      }

      #toggleRotate {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #toggleRotate .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.6);
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
        transition: background 200ms ease, box-shadow 200ms ease;
      }

      #toggleRotate.is-on .dot {
        background: #22c55e;
        box-shadow: 0 0 12px 2px rgba(34, 197, 94, 0.55);
      }

      button {
        appearance: none;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 14px;
        padding: 12px 14px;
        cursor: pointer;
        background: rgba(30, 41, 59, 0.72);
        color: #e2e8f0;
        font: inherit;
        font-weight: 700;
        text-align: left;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      button:hover,
      button.is-active {
        transform: translateY(-1px);
        border-color: rgba(96, 165, 250, 0.85);
        background: linear-gradient(135deg, rgba(37, 99, 235, 0.88), rgba(14, 165, 233, 0.7));
      }

      .status {
        position: fixed;
        left: 20px;
        bottom: 20px;
        z-index: 5;
        padding: 10px 12px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.72);
        color: #cbd5e1;
        font-size: 13px;
        backdrop-filter: blur(18px);
      }

      .loader {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        background: #070914;
        transition: opacity 220ms ease, visibility 220ms ease;
      }

      .loader.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      .loader-card {
        width: min(360px, calc(100vw - 40px));
        padding: 22px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 22px;
        background: rgba(15, 23, 42, 0.8);
        box-shadow: 0 24px 90px rgba(0, 0, 0, 0.45);
      }

      .bar {
        height: 9px;
        margin-top: 16px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(51, 65, 85, 0.9);
      }

      .bar span {
        display: block;
        width: var(--progress, 0%);
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #38bdf8, #a78bfa, #fb7185);
        transition: width 140ms ease;
      }

      @media (max-width: 760px) {
        .hud {
          flex-direction: column;
        }

        .panel,
        .controls {
          width: 100%;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <main id="app" aria-label="3D car preview"></main>

    <section class="hud">
      <div class="panel">
        <h1 id="carTitle">Loading cars...</h1>
        <p id="carDescription">One GLB file, one car visible at a time, with lightweight runtime paint details.</p>
      </div>
      <div class="controls">
        <div id="carControls" class="grid-stack" aria-label="Choose a car preview"></div>
        <div class="actions">
          <button id="toggleRotate" type="button" aria-pressed="false">
            <span class="dot"></span>
            <span class="label">Rotate tires</span>
          </button>
        </div>
      </div>
    </section>

    <div class="status" id="status">Asset budget: GLB is 1.36 MB, no duplicate car files.</div>

    <div class="loader" id="loader">
      <div class="loader-card">
        <strong>Loading lightweight preview</strong>
        <p>Fetching the 1.36 MB GLB once...</p>
        <div class="bar"><span id="progress"></span></div>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./viewer.js?v=42"></script>
  </body>
</html>
